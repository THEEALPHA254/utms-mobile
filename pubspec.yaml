name: utms_mobile
description: University Transport Management System - Student & Driver App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP & networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.0

  # Local storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.0

  # Navigation
  go_router: ^15.0.0

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Maps & Location
  flutter_map: ^8.0.0
  latlong2: ^0.9.1
  geolocator: ^13.0.0
  permission_handler: ^12.0.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0

  # Payments / deep links
  url_launcher: ^6.3.0

  # Utils
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true